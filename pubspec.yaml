name: ecoursale_app
description: White-label student app for Ecoursale schools (talks to the ProjectBigBang /api/v1 backend).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking — Dio gives us request/response interceptors, which we use for the
  # JWT bearer header + automatic silent refresh on 401.
  dio: ^5.7.0

  # Secure, OS-backed token storage (Keychain on iOS, Keystore on Android).
  flutter_secure_storage: ^9.2.2

  # State management — Riverpod scales cleanly (testable, no BuildContext coupling).
  flutter_riverpod: ^2.5.1

  # Routing + deep links (Android App Links now; iOS Universal Links drop in later).
  go_router: ^14.2.7

  # Build-time/runtime config (api_base, default school code) without hardcoding.
  flutter_dotenv: ^5.1.0

  # Image caching for course thumbnails / logos.
  cached_network_image: ^3.4.1

  # Open external URLs (web checkout — payments stay on web by design).
  url_launcher: ^6.3.0

  # WebView powers BOTH the authenticated web handoff (test-window/quiz/checkout)
  # AND Bunny video playback (via Bunny's embed iframe — same as the website, which
  # is what makes token-auth/DRM playback work; a raw .m3u8 gets 403'd).
  webview_flutter: ^4.10.0

  # Native invoice PDF (exact replica of the web invoice) + save/share/print.
  pdf: ^3.11.1
  printing: ^5.13.3

  # Native Razorpay checkout — the payment sheet opens INSIDE the app (no webview,
  # no browser). Smooth Testbook-style purchase; money to the school's own account.
  razorpay_flutter: ^1.3.7

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
