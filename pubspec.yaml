name: ecoursale_app
description: White-label student app for Ecoursale schools (talks to the ProjectBigBang /api/v1 backend).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking — Dio gives us request/response interceptors, which we use for the
  # JWT bearer header + automatic silent refresh on 401.
  dio: ^5.7.0

  # Secure, OS-backed token storage (Keychain on iOS, Keystore on Android).
  flutter_secure_storage: ^9.2.2

  # State management — Riverpod scales cleanly (testable, no BuildContext coupling).
  flutter_riverpod: ^2.5.1

  # Routing + deep links (Android App Links now; iOS Universal Links drop in later).
  go_router: ^14.2.7

  # Build-time/runtime config (api_base, default school code) without hardcoding.
  flutter_dotenv: ^5.1.0

  # Image caching for course thumbnails / logos.
  cached_network_image: ^3.4.1

  # Open external URLs (web checkout — payments stay on web by design).
  url_launcher: ^6.3.0

  # WebView powers BOTH the authenticated web handoff (test-window/quiz/checkout)
  # AND Bunny video playback (via Bunny's embed iframe — same as the website, which
  # is what makes token-auth/DRM playback work; a raw .m3u8 gets 403'd).
  webview_flutter: ^4.10.0

  # Native invoice PDF (exact replica of the web invoice) + save/share/print.
  pdf: ^3.11.1
  printing: ^5.13.3

  # In-app PDF VIEWER for lesson attachments (study material). Renders a downloaded
  # file with the platform PDF engine — the student stays in the app and the signed
  # S3 URL is never handed to a third-party viewer.
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.4

  # Native Razorpay checkout — the payment sheet opens INSIDE the app (no webview,
  # no browser). Smooth Testbook-style purchase; money to the school's own account.
  razorpay_flutter: ^1.3.7

  # Native "Continue with Google" — obtains a Google ID token that the backend
  # (/api/v1/auth/google/) verifies + exchanges for the app JWT. Needs a Google
  # Cloud OAuth client (Android, app package + SHA-1) + GOOGLE_OAUTH_CLIENT_ID.
  google_sign_in: ^6.2.1

  # Native live-class room (LiveKit) — joins the same room as the web, native video
  # + chat. Token minted by the existing gated backend.
  livekit_client: ^2.3.0

  # NATIVE rich question/option/solution rendering (NO webview — must not feel like
  # a website in the app): flutter_html renders the HTML tags + inline base64 images
  # + tables as real Flutter widgets; flutter_math_fork renders the LaTeX natively.
  # Composed so math embedded inside the HTML is typeset inline (custom <tex> tag).
  flutter_html: ^3.0.0
  flutter_math_fork: ^0.7.4

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Generates Android (and later iOS) launcher icons from one 1024x1024 PNG.
  # Run: flutter pub run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - .env

# Launcher icon. Drop a 1024x1024 PNG at assets/icon/app_icon.png (the MindSpan
# logo on a solid/transparent background), then run:
#   flutter pub get
#   flutter pub run flutter_launcher_icons
# For Phase E (per-school flavors) this becomes per-flavor; for now it's MindSpan.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true
